name: Ingest recensione da Issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  ingest:
    if: contains(github.event.issue.labels.*.name, 'recensione')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Estrai allegati immagine dall'issue
        id: attachments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          mkdir -p public/img/locali/_tmp
          node scripts/extract-issue-images.mjs \
            --issue "$ISSUE_NUMBER" \
            --out public/img/locali/_tmp

      - name: Run Claude Code (ingestion headless)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools Read,Write,Edit,Glob,Grep,Bash'
          show_full_output: true
          # Il workflow non deve toccare nulla fuori da content/ e public/img/locali/
          prompt: |
            Sei l'agente di ingestion del sito Aperitivi Urbani.
            Devi processare la GitHub Issue #${{ github.event.issue.number }}
            di titolo: "${{ github.event.issue.title }}".

            REGOLE ASSOLUTE:
            1. Estrai i campi del locale leggendo SOLO il corpo dell'issue
               (URL post, caption, data) e le foto in public/img/locali/_tmp/.
            2. Valida l'output contro schemas/locale-schema.json. Se un campo
               non è desumibile, mettilo a null. NON inventare.
            3. sponsorizzato = true SOLO con segnali espliciti (#adv, #ad,
               #sponsored, "in collaborazione con", "gifting"). Default: false.
            3bis. `indirizzo`: se nel body della issue è presente la sezione
               "**Indirizzo:**", usa quel valore esatto. Altrimenti lascia null.
            3ter. Se nel body della issue è presente la sezione "Note audio
               (trascrizione reel):", usa quel testo come fonte aggiuntiva per
               estrarre informazioni sul locale (piatti, drink, atmosfera, zona).
               Fondilo con la caption scritta. Non inventare nulla che non sia
               presente in caption o note audio.
            3quater. Se nel body della issue è presente la sezione "**Locali
               citati:**", per ogni locale nella lista usa il nome e l'indirizzo
               forniti per creare o aggiornare il file MD corrispondente. Associa
               nome → indirizzo esattamente come scritto. Non inventare indirizzi
               non presenti nella lista.
            4. CLASSIFICA il post in due categorie prima di estrarre:
               - "singola": post dedicato a UN locale (testo descrittivo, opinioni,
                 piatti/drink citati, tono riconoscibile).
               - "lista": post-riepilogo che cita PIÙ locali distinti (es. "23
                 colazioni a Milano", classifiche, roundup tematici). Tipicamente
                 ogni locale ha solo nome/account IG ed eventuale indirizzo, senza
                 testo dedicato.
               Per i post "lista" NON scartare: itera sui locali citati e applica
               le regole 5-8 a OGNUNO di essi separatamente. Per ciascun locale di
               un post "lista" estrai SOLO nome e (se presente) zona/indirizzo;
               tutti gli altri campi opzionali del locale (fascia_prezzo, sentiment,
               voto_dedotto, piatti_drink_citati = []) restano null/vuoti perché il
               post non li fornisce per il singolo locale — è coerente con la
               regola 2 "non inventare", non un errore di estrazione.
            5. Determina lo slug dal nome del locale (lowercase, kebab-case).
            6. Se content/locali/<slug>.md esiste già: AGGIUNGI una entry
               all'array `visite[]` nel frontmatter, NON sovrascrivere il file.
               Se non esiste: crea un nuovo file MD con frontmatter conforme
               allo schema, e corpo Markdown contenente la caption formattata
               (per i post "lista" puoi mettere nel corpo solo la riga
               pertinente del locale, non l'intera caption del roundup).
               In OGNI nuova entry di `visite[]` valorizza il campo `fonte_tipo`
               con "singola" o "lista" coerentemente con la classificazione del
               punto 4. È il segnale per il revisore che molti campi sono null
               per design, non per estrazione fallita.
            7. Sposta le foto da public/img/locali/_tmp/ a
               public/img/locali/<slug>/ rinominandole foto-1.jpg, foto-2.jpg…
               Aggiorna i path nel campo `foto` della visita. Per i post "lista"
               le foto del roundup di solito NON sono attribuibili al singolo
               locale: lascia `foto: []` su tutte le entry generate, a meno che
               sia evidente l'abbinamento foto↔locale.
            8. Aggiorna `ultima_estrazione` con il timestamp ISO 8601 corrente
               su ogni file toccato.
            9. NON modificare alcun file fuori da:
               - content/locali/
               - public/img/locali/
            10. Al termine stampa un riepilogo che includa:
                - tipo di post processato ("singola" o "lista")
                - numero di locali nuovi creati e numero di locali aggiornati
                - elenco completo degli slug toccati con marker [NEW]/[UPD]
                - campi lasciati null e ambiguità rilevate (raggruppati per slug
                  se sono molti)
                Esempio per un post lista: "Tipo: lista. 12 nuovi, 3 aggiornati.
                Slug: bar-luce [NEW], pavé [UPD], …"

            Lo schema è in schemas/locale-schema.json — leggilo prima di
            scrivere qualsiasi cosa.

      - name: Enrich con Google Places API
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if ! git status --porcelain content/locali/ | grep -q '\.md$'; then
            echo "Nessun file MD modificato, skip enrichment."
            exit 0
          fi
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "GOOGLE_MAPS_API_KEY non configurata, skip enrichment."
            exit 0
          fi
          cat > /tmp/enrich-places.mjs <<'NODE_SCRIPT'
          // Arricchimento Places API senza dipendenze esterne.
          // Parsiamo solo i 4 campi top-level del frontmatter che ci interessano
          // (nome, zona, indirizzo, tipo) con regex mirate, e riscriviamo solo
          // quelli — il resto del file resta byte-per-byte invariato (diff
          // minimi, niente noise da reserialization).
          import { readFile, writeFile, readdir } from "node:fs/promises";
          import path from "node:path";

          const API_KEY = process.env.GOOGLE_MAPS_API_KEY;
          const CONTENT_DIR = "content/locali";
          const FM_RE = /^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/;

          const TYPE_MAP = (types = []) => {
            const t = new Set(types);
            if (t.has("cocktail_bar") || t.has("night_club") || t.has("bar")) return "cocktail-bar";
            if (t.has("restaurant")) return "ristorante";
            if (t.has("cafe") || t.has("bakery")) return "caffetteria";
            return null;
          };

          function splitFm(src) {
            const m = src.match(FM_RE);
            if (!m) return null;
            return { fm: m[1], body: m[2] ?? "" };
          }

          // Match top-level "<key>: <value>" (nessuna indentazione iniziale → niente match su entry annidate dentro visite[])
          function readScalar(fm, key) {
            const m = fm.match(new RegExp(`^${key}:[ \\t]*(.*)$`, "m"));
            if (!m) return undefined;
            let v = m[1].trim();
            if (v === "" || v === "null" || v === "~") return null;
            if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) v = v.slice(1, -1);
            return v;
          }

          function readTipoArray(fm) {
            // Flow form: tipo: [a, b]
            const flow = fm.match(/^tipo:[ \t]*\[([^\]]*)\][ \t]*$/m);
            if (flow) {
              return flow[1]
                .split(",")
                .map((s) => s.trim().replace(/^["']|["']$/g, ""))
                .filter(Boolean);
            }
            // Block form: tipo:\n  - a\n  - b
            const block = fm.match(/^tipo:[ \t]*\r?\n((?:[ \t]+-[ \t]+.*\r?\n?)+)/m);
            if (block) {
              return block[1]
                .split(/\r?\n/)
                .map((l) => l.replace(/^[ \t]+-[ \t]+/, "").trim())
                .filter(Boolean)
                .map((s) => s.replace(/^["']|["']$/g, ""));
            }
            return null;
          }

          function yamlQuoteIfNeeded(v) {
            if (v === null || v === undefined) return "null";
            const s = String(v);
            // Bare YAML scalar safe se è ASCII + accenti italiani comuni e niente char ambigui
            if (/^[A-Za-z0-9 .,àèéìòùÀÈÉÌÒÙ'\-]+$/.test(s) && !/^(null|true|false|yes|no|~)$/i.test(s)) return s;
            return `"${s.replace(/\\/g, "\\\\").replace(/"/g, '\\"')}"`;
          }

          function setScalar(fm, key, value) {
            const re = new RegExp(`^(${key}:)[ \\t]*.*$`, "m");
            if (!re.test(fm)) return fm; // se la chiave non esiste a top-level, no-op
            return fm.replace(re, `$1 ${yamlQuoteIfNeeded(value)}`);
          }

          function setTipoArray(fm, arr) {
            const block = `tipo:\n  - ${arr.map((s) => yamlQuoteIfNeeded(s)).join("\n  - ")}`;
            if (/^tipo:[ \t]*\[[^\]]*\][ \t]*$/m.test(fm)) {
              return fm.replace(/^tipo:[ \t]*\[[^\]]*\][ \t]*$/m, block);
            }
            if (/^tipo:[ \t]*\r?\n((?:[ \t]+-[ \t]+.*\r?\n?)+)/m.test(fm)) {
              return fm.replace(/^tipo:[ \t]*\r?\n((?:[ \t]+-[ \t]+.*\r?\n?)+)/m, block + "\n");
            }
            return fm;
          }

          function needsEnrichment(d) {
            const zonaGeneric = !d.zona || d.zona === "Milano";
            const tipoGeneric = Array.isArray(d.tipo) && d.tipo.length === 1 && d.tipo[0] === "altro";
            const indirizzoMissing = !d.indirizzo;
            return zonaGeneric || tipoGeneric || indirizzoMissing;
          }
          function extractIndirizzo(formatted) {
            if (!formatted) return null;
            const first = formatted.split(",")[0]?.trim();
            return first || null;
          }
          function extractZona(components) {
            if (!Array.isArray(components)) return null;
            const pick = (t) => components.find((c) => c.types?.includes(t))?.long_name;
            return pick("sublocality_level_1") || pick("sublocality") || pick("neighborhood") || null;
          }

          async function textSearch(name) {
            const q = encodeURIComponent(`${name} Milano`);
            const url = `https://maps.googleapis.com/maps/api/place/textsearch/json?query=${q}&key=${API_KEY}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`textsearch HTTP ${res.status}`);
            const j = await res.json();
            if (j.status && j.status !== "OK" && j.status !== "ZERO_RESULTS") {
              throw new Error(`textsearch status=${j.status} ${j.error_message ?? ""}`);
            }
            return j.results?.[0] ?? null;
          }
          async function placeDetails(placeId) {
            const url = `https://maps.googleapis.com/maps/api/place/details/json?place_id=${placeId}&fields=address_components,formatted_address,types&key=${API_KEY}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`details HTTP ${res.status}`);
            const j = await res.json();
            if (j.status && j.status !== "OK") {
              throw new Error(`details status=${j.status} ${j.error_message ?? ""}`);
            }
            return j.result ?? null;
          }

          let files = [];
          try { files = (await readdir(CONTENT_DIR)).filter((f) => f.endsWith(".md")); }
          catch { console.log("content/locali non esiste, skip."); process.exit(0); }

          let enriched = 0, missed = 0, skipped = 0, errors = 0;
          for (const file of files) {
            const full = path.join(CONTENT_DIR, file);
            const src = (await readFile(full, "utf8")).replace(/^﻿/, "");
            const split = splitFm(src);
            if (!split) { console.log(`skip ${file}: no frontmatter`); skipped++; continue; }
            let { fm, body } = split;

            const d = {
              nome: readScalar(fm, "nome"),
              zona: readScalar(fm, "zona"),
              indirizzo: readScalar(fm, "indirizzo"),
              tipo: readTipoArray(fm),
            };

            if (!d.nome) { console.log(`skip ${file}: senza nome`); skipped++; continue; }
            if (!needsEnrichment(d)) { console.log(`skip ${file}: già arricchito`); skipped++; continue; }

            try {
              const r = await textSearch(d.nome);
              if (!r?.place_id) { console.log(`miss ${file}: nessun risultato Places per "${d.nome}"`); missed++; continue; }
              const details = await placeDetails(r.place_id);
              if (!details) { missed++; continue; }

              let changed = false;
              let newIndirizzo = d.indirizzo, newZona = d.zona, newTipo = d.tipo;

              if (!d.indirizzo) {
                const ind = extractIndirizzo(details.formatted_address);
                if (ind) { newIndirizzo = ind; fm = setScalar(fm, "indirizzo", ind); changed = true; }
              }
              if (!d.zona || d.zona === "Milano") {
                const z = extractZona(details.address_components);
                if (z) { newZona = z; fm = setScalar(fm, "zona", z); changed = true; }
              }
              if (Array.isArray(d.tipo) && d.tipo.length === 1 && d.tipo[0] === "altro") {
                const mapped = TYPE_MAP(details.types);
                if (mapped) { newTipo = [mapped]; fm = setTipoArray(fm, [mapped]); changed = true; }
              }

              if (changed) {
                await writeFile(full, `---\n${fm}\n---\n${body}`, "utf8");
                console.log(`✓ enriched ${file}: indirizzo="${newIndirizzo ?? ""}" zona="${newZona ?? ""}" tipo=${JSON.stringify(newTipo)}`);
                enriched++;
              } else {
                console.log(`no-op ${file}: Places non ha aggiunto info utili`);
                missed++;
              }
            } catch (e) {
              console.log(`error ${file}: ${e.message}`);
              errors++;
            }
          }
          console.log(`\nEnrichment summary: ${enriched} arricchiti, ${missed} miss, ${skipped} skip, ${errors} errori.`);
          NODE_SCRIPT
          node /tmp/enrich-places.mjs

      - name: Valida i file modificati contro lo schema
        run: node scripts/validate-locali.mjs

      - name: Apri Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ingest/issue-${{ github.event.issue.number }}
          base: main
          commit-message: "ingest: recensione da issue #${{ github.event.issue.number }}"
          title: "Recensione da issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          body: |
            Generato automaticamente dall'issue #${{ github.event.issue.number }}.

            **Checklist di review (campi a rischio di errore di estrazione):**
            - [ ] `nome` del locale corretto
            - [ ] `zona` / `indirizzo` plausibili
            - [ ] `tipo[]` coerente con la caption
            - [ ] `sponsorizzato` correttamente identificato (occhio ai falsi negativi e ai falsi positivi)
            - [ ] `sentiment` e `voto_dedotto` coerenti col tono
            - [ ] `piatti_drink_citati` presenti davvero nella caption
            - [ ] foto rinominate e referenziate correttamente

            Chiude #${{ github.event.issue.number }} al merge.
          labels: |
            ingest
            da-rivedere

      - name: Commenta sull'issue con link alla PR
        if: steps.cpr.outputs.pull-request-url
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.cpr.outputs.pull-request-url }}";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Pull Request generata: ${url}\n\nLa review umana è richiesta prima del merge.`
            });

      - name: Segnala se l'estrazione è fallita
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["ingest-failed"]
            });
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "L'ingestion automatica è fallita. Controlla i log del workflow."
            });
